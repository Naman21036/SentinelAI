version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.10

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Run lint
          command: |
            pip install flake8
            flake8 .

      - run:
          name: Run tests
          command: |
            echo "No tests yet"

workflows:
  version: 2
  build_pipeline:
    jobs:
      - build